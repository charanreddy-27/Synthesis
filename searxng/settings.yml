# Minimal SearXNG config for Synthesis. The `json` format is required so the
# researcher agent can consume results programmatically.
use_default_settings: true

server:
  # Change this secret for any non-local deployment.
  secret_key: "synthesis-dev-secret-change-me"
  limiter: false
  image_proxy: false

search:
  safe_search: 1
  formats:
    - html
    - json

ui:
  static_use_hash: true
